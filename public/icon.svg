<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Achtergrond -->
  <rect width="512" height="512" rx="96" fill="#ff6b6b"/>
  <!-- Dobbelsteenvlak (wit) -->
  <rect x="80" y="80" width="352" height="352" rx="64" fill="white" opacity="0.95"/>
  <!-- Ogen van de dobbelsteen (warm donker) -->
  <!-- Rij 1: links boven, rechts boven -->
  <circle cx="175" cy="175" r="36" fill="#2d2417"/>
  <circle cx="337" cy="175" r="36" fill="#2d2417"/>
  <!-- Midden -->
  <circle cx="256" cy="256" r="36" fill="#ff6b6b"/>
  <!-- Rij 3: links onder, rechts onder -->
  <circle cx="175" cy="337" r="36" fill="#2d2417"/>
  <circle cx="337" cy="337" r="36" fill="#2d2417"/>
  <!-- Sterretje accent -->
  <circle cx="420" cy="92" r="20" fill="#ffe66d"/>
</svg>
